<!DOCTYPE html>
<html>
<head>
    <title>User Registration Form</title>
</head>
<body>
    <h1>User Registration Form</h1>
    
    <form id="registrationForm">
        <div>
            <label>Full Name:</label>
            <input type="text" id="fullName" required>
            <span id="nameError" style="color:red"></span>
        </div>
        <br>
        
        <div>
            <label>Email Address:</label>
            <input type="email" id="email" required>
            <span id="emailError" style="color:red"></span>
        </div>
        <br>
        
        <div>
            <label>Password:</label>
            <input type="password" id="password" required>
            <span id="passwordError" style="color:red"></span>
        </div>
        <br>
        
        <button type="button" onclick="validateForm()">Register</button>
    </form>
    
    <div id="successMessage" style="color:green; display:none;">
        Registration Successful!
    </div>

    <script>
        function validateForm() {
            // Get form values
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            let isValid = true;
            
            // Clear previous errors
            document.getElementById('nameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            
            // Name validation
            if (name.length < 3) {
                document.getElementById('nameError').textContent = 'Name must be at least 3 characters';
                isValid = false;
            }
            if (/\d/.test(name)) {
                document.getElementById('nameError').textContent = 'Name should not contain numbers';
                isValid = false;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').textContent = 'Invalid email address';
                isValid = false;
            }
            
            // Password validation
            if (password.length < 8) {
                document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
                isValid = false;
            }
            if (!/[A-Z]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must contain at least 1 uppercase letter';
                isValid = false;
            }
            if (!/[a-z]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must contain at least 1 lowercase letter';
                isValid = false;
            }
            if (!/\d/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must contain at least 1 number';
                isValid = false;
            }
            if (!/[@!#$%^&*]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must contain at least 1 special character (@, !, #, $, etc.)';
                isValid = false;
            }
            
            // Show success message if valid
            if (isValid) {
                document.getElementById('successMessage').style.display = 'block';
                // Clear form
                document.getElementById('registrationForm').reset();
            }
        }
    </script>
</body>
</html>
