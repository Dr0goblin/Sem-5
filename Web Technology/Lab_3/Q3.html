<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="simle-form.css">
</head>
<body>
    <div class="form-box">
        <h2>Register Here</h2>
        
        <form>
            <!-- Full Name -->
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" placeholder="Enter your Name">
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label>Email ID:</label>
                <input type="email" placeholder="Enter your Email">
            </div>
            
            <!-- Password -->
            <div class="form-group">
                <label>Password:</label>
                <input type="password" placeholder="Enter your Password">
            </div>
            
            <!-- Gender -->
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" checked> Female</label>
                    <label><input type="radio" name="gender"> Male</label>
                </div>
            </div>
            
            <!-- Interests -->
            <div class="form-group">
                <label>Your Interests:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" checked> Coding</label>
                    <label><input type="checkbox"> Singing</label>
                    <label><input type="checkbox"> Football</label>
                    <label><input type="checkbox"> Dancing</label>
                    <label><input type="checkbox"> Basketball</label>
                </div>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>
</body>
</html>
