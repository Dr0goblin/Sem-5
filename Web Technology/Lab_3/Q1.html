<!DOCTYPE html>
<html>
<head>
    <title>Simple Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>MyShop</h1>
    </div>
    
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
    </div>
    
    <div class="container">
        <!-- Left Ad -->
        <div class="ad left">
            <h3>ADVERTISEMENT</h3>
            <p>Buy 1 Get 1 Free!</p>
            <p>Limited Time Offer</p>
        </div>
        
        <!-- Main Content -->
        <div class="main">
            <h2>Products</h2>
            
            <div class="products">
                <div class="product">
                    <h3>Product 1</h3>
                    <p>$19.99</p>
                </div>
                <div class="product">
                    <h3>Product 2</h3>
                    <p>$29.99</p>
                </div>
                <div class="product">
                    <h3>Product 3</h3>
                    <p>$39.99</p>
                </div>
                <div class="product">
                    <h3>Product 4</h3>
                    <p>$49.99</p>
                </div>
                <div class="product">
                    <h3>Product 5</h3>
                    <p>$59.99</p>
                </div>
                <div class="product">
                    <h3>Product 6</h3>
                    <p>$69.99</p>
                </div>
            </div>
        </div>
        
        <!-- Right Ad -->
        <div class="ad right">
            <h3>ADVERTISEMENT</h3>
            <p>Free Shipping!</p>
            <p>On all orders</p>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; 2026 Basant Shop</p>
    </div>
</body>
</html>
